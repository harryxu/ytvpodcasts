services:
  web:
    build:
      context: ..
      dockerfile: docker/Dockerfile
    expose:
      - "5000"
    volumes:
      - ../data:/app/data

  nginx:
    image: nginx:latest
    ports:
      - "8089:80"
    volumes:
      - ../nginx.conf.template:/etc/nginx/templates/default.conf.template:ro
      - ../data:/app/data
    depends_on:
      - web

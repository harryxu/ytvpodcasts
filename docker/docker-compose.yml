services:
  vpodcasts:
    image: vpodcasts:latest
    expose:
      - "5000"
    volumes:
      - ../data:/app/data
    environment:
      - BASE_URL=http://localhost:8089
      - PODCAST_TITLE=My Video Podcast
      - PODCAST_DESCRIPTION=A podcast generated from videos.
      - PODCAST_LINK=https://github.com/your_repo

  nats:
    image: nats:alpine
    container_name: vpodcasts-nats
    environment:
      TZ: ${TZ:-Asia/Shanghai}
    volumes:
      - /etc/localtime:/etc/localtime:ro
      - /etc/timezone:/etc/timezone:ro
    command: ["-js"]

  nginx:
    image: nginx:latest
    container_name: vpodcasts-nginx
    ports:
      - "8089:80"
    volumes:
      - ./nginx.conf.template:/etc/nginx/templates/default.conf.template:ro
      - ../data:/app/data
    environment:
      - NGINX_SERVER_NAME=localhost
    depends_on:
      - vpodcasts

[project]
name = "vpodcasts"
version = "0.1.0"
description = "YouTube as Podcast"
requires-python = ">=3.13"
dependencies = [
    "feedgen>=1.0.0",
    "lxml==5.4.0",
    "python-dateutil==2.9.0.post0",
    "yt-dlp>=2025.9.26",
    "six>=1.17.0",
    "flask>=2.0.0",
    "python-dotenv==0.21.0",
    "click>=8.0.0",
    "gunicorn>=23.0.0",
    "supervisor>=4.2.5",
    "honcho>=2.0.0",
    "sqlmodel>=0.0.25",
    "alembic>=1.16.5",
    "huey>=2.5.3",
]

[tool.uv]
# uv-specific configuration can go here.

[build-system]
requires = ["hatchling"]
build-backend = "hatchling.build"

[tool.hatch.build.targets.wheel]
packages = ["."]

[tool.basedpyright]
ignore = [
    ".venv",
    "alembic",
    "**/node_modules",
    "**/__pycache__"
]
reportExplicitAny = false
reportAny = false
reportUnusedCallResult = false

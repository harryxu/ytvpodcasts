[supervisord]
nodaemon=true
logfile=/dev/null
logfile_maxbytes=0
pidfile=/tmp/supervisord.pid

[program:alembic]
command=alembic upgrade head
directory=/app
autostart=true
autorestart=false
startsecs=0
priority=1
redirect_stderr=true
stdout_logfile=/dev/stdout
stdout_logfile_maxbytes=0

[program:gunicorn]
command=gunicorn -w 4 -b 0.0.0.0:5000 vpodcasts.webapp:app
directory=/app
autostart=true
autorestart=true
priority=10
redirect_stderr=true
stdout_logfile=/dev/stdout
stdout_logfile_maxbytes=0

[program:huey]
command=uv run huey_consumer vpodcasts.huey_tasks.huey -w 1
directory=/app
autostart=true
autorestart=true
priority=10
redirect_stderr=true
stdout_logfile=/dev/stdout
stdout_logfile_maxbytes=0

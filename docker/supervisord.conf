[supervisord]
nodaemon=true
logfile=/dev/null
logfile_maxbytes=0
pidfile=/tmp/supervisord.pid

[program:alembic]
command=alembic upgrade head
directory=/app
autostart=true
autorestart=false
startsecs=0
priority=1
redirect_stderr=true
stdout_logfile=/dev/stdout
stdout_logfile_maxbytes=0

[program:gunicorn]
command=uvicorn vpodcasts.webapp:app --host 0.0.0.0 --port 5000
directory=/app
autostart=true
autorestart=true
priority=10
redirect_stderr=true
stdout_logfile=/dev/stdout
stdout_logfile_maxbytes=0

[program:taskiq]
command=uv run taskiq worker vpodcasts.taskiq_broker:broker
directory=/app
autostart=true
autorestart=true
priority=10
redirect_stderr=true
stdout_logfile=/dev/stdout
stdout_logfile_maxbytes=0

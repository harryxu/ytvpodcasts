services:
  web:
    build:
      context: ..
      dockerfile: docker/Dockerfile
    expose:
      - "5000"
    volumes:
      - ./data:/app/data
      - ./episodes:/app/episodes

  nginx:
    image: nginx:latest
    ports:
      - "8089:80"
    volumes:
      - ./nginx.conf:/etc/nginx/conf.d/default.conf:ro
      - ./episodes:/app/episodes:ro
    depends_on:
      - web
